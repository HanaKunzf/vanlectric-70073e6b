# Build Vanlectric and deploy static output to the production repository.
#
# Source repo:      HanaKunzf/vanlectric-70073e6b  (this repo, branch: main)
# Production repo:  HanaKunzf/vanlectric-production (branch: main)
#
# Webkitty hosting configuration (set this in the Webkitty control panel):
#   Repository:        HanaKunzf/vanlectric-production
#   Branch:            main
#   Deployment script: (leave empty)
#   Document root:     vanlectric_html
#
# Required GitHub secret:
#   PROD_DEPLOY_TOKEN  – a Personal Access Token (classic: "repo" scope, OR
#                        a fine-grained PAT with "Contents: Read and write"
#                        permission on the HanaKunzf/vanlectric-production
#                        repository). Add it in:
#                        Settings → Secrets and variables → Actions → New
#                        repository secret, name it PROD_DEPLOY_TOKEN.
#
# The token must belong to a user with push access to the production repo.
# GITHUB_TOKEN cannot be used because it only has access to the source repo.

name: Build and Deploy to Production Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build production bundle
        run: bun run build

      - name: Ensure SPA + hosting helper files
        run: |
          # Prevent GitHub Pages-style Jekyll processing if ever served that way.
          touch dist/.nojekyll

      - name: Deploy dist to production repository (main branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PROD_DEPLOY_TOKEN }}
          external_repository: HanaKunzf/vanlectric-production
          publish_branch: main
          publish_dir: ./dist
          force_orphan: true
          commit_message: "Deploy: ${{ github.sha }}"
          user_name: "vanlectric-deploy-bot"
          user_email: "deploy-bot@users.noreply.github.com"
