# Build Vanlectric and deploy static output to the production repository.
#
# Source repo:      HanaKunzf/vanlectric-70073e6b  (this repo, branch: main)
# Production repo:  HanaKunzf/vanlectric-production (branch: main)
#
# Webkitty hosting configuration (set this in the Webkitty control panel):
#   Repository:        HanaKunzf/vanlectric-production
#   Branch:            main
#   Deployment script: (leave empty)
#   Document root:     vanlectric_html
#
# Required GitHub secret (in the SOURCE repo):
#   PROD_DEPLOY_TOKEN  – Personal Access Token that can push to
#                        HanaKunzf/vanlectric-production.
#
#   Accepted token types:
#     • Classic PAT with the "repo" scope, OR
#     • Fine-grained PAT with:
#         - Repository access: HanaKunzf/vanlectric-production
#         - Repository permissions:
#             · Contents:      Read and write   (REQUIRED)
#             · Metadata:      Read-only        (REQUIRED, auto-included)
#             · Workflows:     Read and write   (only if the production
#                              repo contains .github/workflows/* files;
#                              we do not push any, so usually NOT needed)
#
#   The token must belong to a user that has push access to the
#   production repository (owner or collaborator).
#
#   Add it in: Settings → Secrets and variables → Actions →
#              New repository secret → name: PROD_DEPLOY_TOKEN

name: Build and Deploy to Production Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build production bundle
        run: bun run build

      - name: Verify dist exists
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist/ directory was not created by the build."
            exit 1
          fi
          echo "dist/ contents:"
          ls -la dist
          echo "Total files: $(find dist -type f | wc -l)"

      - name: Add hosting helper files to dist
        run: |
          # Prevent any Jekyll-style processing on static hosts.
          touch dist/.nojekyll

      - name: Deploy dist/ to production repository (main branch)
        env:
          DEPLOY_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}
          SRC_SHA: ${{ github.sha }}
          SRC_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_TOKEN}" ]; then
            echo "ERROR: PROD_DEPLOY_TOKEN secret is empty or not set."
            echo "Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

          TARGET_REPO="HanaKunzf/vanlectric-production"
          TARGET_BRANCH="main"

          # Work in a clean directory completely separate from the source repo
          # so we never accidentally commit src/, package.json, etc.
          WORK_DIR="$(mktemp -d)"
          echo "Work dir: ${WORK_DIR}"

          # Copy ONLY the build output. Use cp -a to preserve dotfiles
          # like .nojekyll. The trailing /. copies contents, not the folder.
          cp -a dist/. "${WORK_DIR}/"

          cd "${WORK_DIR}"

          # Sanity check: make sure no source files leaked in.
          for forbidden in src package.json bun.lockb vite.config.ts tsconfig.json node_modules; do
            if [ -e "${forbidden}" ]; then
              echo "ERROR: '${forbidden}' is in the publish directory. Aborting."
              exit 1
            fi
          done

          echo "Files to publish:"
          ls -la

          git init -q -b "${TARGET_BRANCH}"
          git config user.name  "vanlectric-deploy-bot"
          git config user.email "deploy-bot@users.noreply.github.com"

          # Authenticate via token in the URL. x-access-token works for both
          # classic PATs and fine-grained PATs.
          REMOTE_URL="https://x-access-token:${DEPLOY_TOKEN}@github.com/${TARGET_REPO}.git"
          git remote add origin "${REMOTE_URL}"

          git add -A
          git commit -q -m "Deploy from ${SRC_REPO}@${SRC_SHA}"

          # Force-push so the production repo always mirrors the latest
          # build output and never accumulates source-code history.
          echo "Pushing to ${TARGET_REPO} (${TARGET_BRANCH})..."
          git push --force origin "${TARGET_BRANCH}"

          echo "Deploy complete."
